services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ycyw
      POSTGRES_PASSWORD: ycyw
      POSTGRES_DB: ycyw_poc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ycyw -d ycyw_poc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://ycyw:ycyw@db:5432/ycyw_poc
      JWT_SECRET: change-me-in-production
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  pgdata:
